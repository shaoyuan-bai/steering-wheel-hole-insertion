# Central configuration for steering-wheel center-hole insertion.
# Units: distances in meters, angles in radians unless a key says _deg.

robot:
  ip: "169.254.128.21"
  port: 8080
  force_type_name: "RM_MODEL_RM_SF_E"
  initial_joint_deg: [-9.144, 72.947, 94.574, -99.437, -88.530, -154.118]

camera:
  serial: ""
  width: 1280
  height: 720
  fps: 30
  warmup: 30

hand_eye:
  # Updated from eye_hand_data/data20260601.
  valid: true
  frame: "T_EE_CAM"
  matrix:
    - [0.85890465, -0.51167270, -0.02176798, 0.02093956]
    - [0.51182742, 0.85908633, 0.00183437, -0.10130280]
    - [0.01776197, -0.01271700, 0.99976137, 0.05238398]
    - [0.0, 0.0, 0.0, 1.0]

tool:
  tool_axis: "+z"
  tcp_to_tip_m: 0.1598
  tip_tcp_m: [-0.000003, 0.006021, 0.159636]

motion:
  # Previous tested speeds before max-speed change:
  # initial_movej_speed=50, movej_speed=20, movel_speed=3, frontend_insert_speed=10
  initial_movej_speed: 100
  movej_speed: 100
  movel_speed: 100
  frontend_insert_speed: 100
  max_joint_step_deg: 90.0
  max_j6_step_deg: 90.0

insertion:
  offset_frame: "camera"
  observed_right_offset_m: -0.0050
  observed_up_offset_m: 0.0080
  preinsert_distance_m: 0.040
  insert_depth_m: 0.002
  frontend_insert_distance_m: 0.010
  frontend_max_insert_distance_m: 0.010
  max_preinsert_move_m: 0.35
  max_insert_move_m: 0.12
  max_insert_depth_m: 0.015
  min_tcp_z_m: -0.05
  reverse_insert_axis: false

detection:
  model: "label_dataset/best.onnx"
  imgsz: 960
  yolo_conf: 0.05
  yolo_iou: 0.45
  mask_threshold: 0.5
  min_confidence: 0.35
  min_abs_normal_z: 0.55
  normal_draw_length_m: 0.08

gripper:
  device_id: 9
  open_position: 255
  close_position: 0
  speed: 255
  force: 255
  timeout_s: 5

paths:
  snapshot_dir: "preview_snapshots"
  frontend_run_dir: "frontend_runs"
  live_run_dir: "live_runs"
  captures_dir: "captures"
  recording_dir: "vla_recordings"

recording:
  fps: 10.0
  robot_timeout_s: 1.0

mobile_base:
  base_url: "http://192.168.2.228:5001"
  timeout_s: 30.0

placement:
  poses_file: "table_place_poses.json"
  movej_speed: 30
  descend_speed: 5
  retreat_speed: 10
  lift_exec_mode: 2
  lift_speed: 0.03
  # Sign depends on lift API convention. Test with dry-run and a small value first.
  lift_lower_height_m: -0.10
  lift_raise_height_m: 0.10
  settle_s: 0.5
  max_current_to_pre_m: 0.80
  max_descend_m: 0.20
  max_retreat_m: 0.20
  gripper_action: "close"

post_insert_sequence:
  poses_file: "table_place_poses.json"
  first_lift_height_m: 0.01
  backward_distance_m: -0.20
  rotate_angle_deg: -90.0
  forward_distance_m: 1.00
  place_lift_lower_height_m: -0.10
  place_lift_raise_height_m: 0.10
  lift_speed: 0.03
  base_speed: 0.10
  rotate_speed: 0.20
  settle_s: 1.0
  movej_speed: 30
  max_current_to_pre_m: 1.20

post_insert_return_sequence:
  lift_height_m: -0.01
  backward_distance_m: -1.00
  rotate_angle_deg: 90.0
  forward_distance_m: 0.20
  lift_speed: 0.03
  base_speed: 0.10
  rotate_speed: 0.20
